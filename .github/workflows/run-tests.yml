name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: '8.1'
            laravel: '10.*'
            testbench: '^8.0'
            stability: prefer-stable
          - php: '8.2'
            laravel: '10.*'
            testbench: '^8.0'
            stability: prefer-stable
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
            stability: prefer-stable
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
            stability: prefer-stable
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
            stability: prefer-stable
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
            stability: prefer-stable
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'
            stability: prefer-stable
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
            stability: prefer-stable

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest
